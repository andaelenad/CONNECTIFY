<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Connectify - Profilul Meu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="profile-container">
        <header>
            <h1 class="logo">Connectify</h1>
            <nav>
                <!-- link uri pt functionalitatile de add friend -->
                <a href="/get_tracks">Profil</a> | 
                <a href="/search_users">Caută Prieteni</a> | 
                <a href="/requests">Cereri Prietenie</a>
            </nav>
        </header>

        <main>
            <section class="user-info">
                <h2>Topul tău de piese:</h2>
                <p>Acestea sunt melodiile care te definesc în acest moment.</p>
            </section>

            <ul class="track-list">
                {% for track in tracks %}
                    <li class="track-item" style="display: flex; align-items: center; margin-bottom: 15px;">
                        <!-- imaginea albumului pentru un aspect profi -->
                        <img src="{{ track.album.images[2].url }}" alt="Copertă" style="margin-right: 15px; border-radius: 4px;">
                        
                        <div class="track-details">
                            <strong>{{ track.name }}</strong> <br>
                            <span class="artist-name">by {{ track.artists[0].name }}</span>
                        </div>

                        <!-- butonul de "Rate Album/Song" -->
                        <button class="rate-btn" style="margin-left: auto;">Rate ⭐</button>
                    </li>
                {% endfor %}
            </ul>
        </main>

        <footer>
            <a href="/" class="back-link">← Înapoi la pagina principală</a>
            <p>&copy; 2026 Connectify</p>
        </footer>
    </div>
</body>
</html>
