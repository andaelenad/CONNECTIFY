<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Connectify - Dashboard</title>
    <link rel="icon" type="/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="profile-container">
        {% include 'header.html' %}
        <main>
            <section class="user-info">
                <h2>Topul tău de piese:</h2>
                <p>Acestea sunt melodiile care te definesc în acest moment.</p>
            </section>

            <ul class="track-list">
                {% for track in tracks %}
                <li class="track-item" style="display: flex; align-items: center; margin-bottom: 15px;">
                    <img src="{{ track.album.images[2].url }}" alt="Copertă"
                        style="margin-right: 15px; border-radius: 4px;">

                    <div class="track-details">
                        <strong>{{ track.name }}</strong> <br>
                        <span class="artist-name">by {{ track.artists[0].name }}</span>
                    </div>

                    <button class="rate-btn" style="margin-left: auto;">Rate ⭐</button>
                </li>
                {% endfor %}
            </ul>

            <!-- SECȚIUNE NOUĂ: GESTIONARE CONT -->
            <hr>

            <section class="account-settings" style="display: flex; justify-content: flex-end; padding: 20px 0;">
                <form action="{{ url_for('delete_self') }}" method="POST"
                    onsubmit="return confirm('Sigur vrei să ștergi contul?');">
                    <button type="submit" class="delete-btn-styled">
                        Șterge Contul
                    </button>
                </form>
            </section>
        </main>

        <footer>
            <a href="{{ url_for('dashboard') }}"> ← Înapoi la Dashboard</a>
        </footer>
    </div>
</body>

</html>
